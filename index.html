// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = n => `$${Math.round(n).toLocaleString()}`;
const pct = n => `${Math.round(n)}%`;
const today = () => new Date().toISOString().slice(0,10);

function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate()-((day+6)%7)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {start:mon,end:sun};
}
function isThisWeek(ds) {
  const {start,end}=getWeekRange(); const d=new Date(ds+"T12:00:00");
  return d>=start && d<=end;
}
function groupByWeek(jobs) {
  const g={};
  jobs.forEach(j=>{
    const d=new Date(j.date+"T12:00:00"); const day=d.getDay();
    const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
    const key=mon.toISOString().slice(0,10);
    if(!g[key]) g[key]=[];
    g[key].push(j);
  });
  return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
}
function calcFixed(settings) {
  return settings.fixedExpenses.reduce((s,e)=>s+e.monthly,0)/4.33;
}
function weekLabel(weekStart) {
  const d=new Date(weekStart+"T12:00:00");
  const end=new Date(d); end.setDate(d.getDate()+6);
  return `${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${end.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
}

// ── JOB MODAL ─────────────────────────────────────────────────────────────────
const JobModal = ({job,onClose,onSave,onDelete,settings}) => {
  const isEdit = !!(job&&job.id);
  const [form,setForm] = useState(job&&job.id ? {...job,revenue:String(job.revenue),cost:String(job.cost)} : {date:today(),service:"Flat Repair",city:"Miami Gardens",revenue:"",cost:"",source:"Google",payment:"Card",tireSize:"",notes:""});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const gross = (parseFloat(form.revenue)||0)-(parseFloat(form.cost)||0);
  const target = form.service==="Flat Repair"?settings.repairTarget:settings.replacementTarget;
  const atTarget = gross>0&&gross>=target;
  const belowTarget = gross>0&&gross<target;
  return (
    <Modal title={isEdit?"Edit Job":"Log a Job"} onClose={onClose}>
      <FInput label="Date" type="date" value={form.date} onChange={v=>set("date",v)}/>
      <FSelect label="Service Type" value={form.service} onChange={v=>set("service",v)} options={SERVICES}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FInput label="Revenue ($)" type="number" value={form.revenue} onChange={v=>set("revenue",v)} placeholder="0"/>

      </div>
      {(form.revenue||form.cost)?<div style={{background:atTarget?C.successDim:belowTarget?C.warnDim:C.card,border:`1px solid ${atTarget?C.success+"44":belowTarget?C.warn+"44":C.border}`,borderRadius:12,padding:12,marginBottom:12}}>

          <div style={{fontSize:12,color:atTarget?C.success:C.warn,fontWeight:600,textAlign:"right",maxWidth:140}}>{atTarget?"✓ Meets profit target":belowTarget?`⚠ Below ${fmt(target)} target`:""}</div>
        </div>
      </div>:null}
      <FSelect label="City / Area" value={form.city} onChange={v=>set("city",v)} options={CITIES}/>

      </div>
      <FInput label="Notes (optional)" value={form.notes} onChange={v=>set("notes",v)} placeholder="Any details..."/>
      <Btn label={isEdit?"Save Changes":"Log Job"} onClick={()=>onSave(form)} style={{width:"100%",marginTop:4}}/>
      {isEdit&&<Btn label="Delete Job" variant="danger" onClick={()=>onDelete(job.id)} style={{width:"100%",marginTop:8}}/>}
    </Modal>
  );
};

const Dashboard=({jobs,settings})=>{
  const wk=jobs.filter(j=>isThisWeek(j.date));
  const rev=wk.reduce((s,j)=>s+j.revenue,0);
  const dc=wk.reduce((s,j)=>s+j.cost,0);
  const gp=rev-dc;
  const fixed=calcFixed(settings);
  const net=gp-fixed;
  const avg=wk.length?gp/wk.length:0;
  const jobsNeeded=avg>0?Math.max(0,Math.ceil((settings.weeklyGoal-net)/avg)):0;
  const goalPct=Math.min((net/settings.weeklyGoal)*100,100);
  const tax=net*(settings.taxRate/100);
  const payout=(net-tax)*(settings.ownerSplit/100);
  const netColor=net>=0?C.success:C.danger;

  const bySvc={};
  wk.forEach(j=>{if(!bySvc[j.service])bySvc[j.service]={gp:0,count:0};bySvc[j.service].gp+=j.revenue-j.cost;bySvc[j.service].count++;});

  const byCity={};
  wk.forEach(j=>{if(!byCity[j.city])byCity[j.city]=0;byCity[j.city]+=j.revenue-j.cost;});

  const belowTarget=wk.some(j=>{const g=j.revenue-j.cost;return j.service==="Flat Repair"?g<settings.repairTarget:j.service==="Tire Replacement"?g<settings.replacementTarget:false;});

  const now=new Date(); const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
  return(
    <div style={{padding:"16px 16px 0"}}>
      {/* Logo */}

            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="white" strokeWidth="2"/>
              <circle cx="12" cy="12" r="3" fill="white"/>
              <line x1="12" y1="3" x2="12" y2="7" stroke="white" strokeWidth="2"/>
              <line x1="12" y1="17" x2="12" y2="21" stroke="white" strokeWidth="2"/>
              <line x1="3" y1="12" x2="7" y2="12" stroke="white" strokeWidth="2"/>
              <line x1="17" y1="12" x2="21" y2="12" stroke="white" strokeWidth="2"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:"-0.02em",lineHeight:1.1}}>Wheel <span style={{color:C.orange}}>Rush</span></div>
            <div style={{fontSize:11,color:C.muted}}>Mobile Tire Repair</div>
          </div>
        </div>
        <div style={{fontSize:11,color:C.muted,textAlign:"right"}}>
          <div style={{fontWeight:700,color:C.text}}>{wd} · {now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
          <div>Today</div>
        </div>
      </div>

      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${C.card} 0%,#1A1200 100%)`,border:`1px solid ${C.border}`,borderRadius:20,padding:20,marginBottom:12,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:C.orange+"08"}}/>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:C.muted,textTransform:"uppercase",marginBottom:8}}>Net Profit This Week</div>
        <div style={{fontSize:48,fontWeight:900,color:netColor,letterSpacing:"-0.03em",lineHeight:1}}>{fmt(net)}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:6}}>After direct costs and fixed expenses</div>
        <div style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:C.muted}}>Weekly Goal Progress</span>
            <span style={{fontSize:12,fontWeight:700,color:goalPct>=100?C.success:C.orange}}>{pct(goalPct)}</span>

// ── STOCK ─────────────────────────────────────────────────────────────────────
const Stock=({stock,setStock})=>{
  const [search,setSearch]=useState("");
  const [showAll,setShowAll]=useState(false);
  const f=stock.filter(s=>!search||s.size.toLowerCase().includes(search)||s.brand.toLowerCase().includes(search));
  const out=f.filter(s=>s.qty===0); const low=f.filter(s=>s.qty>0&&s.qty<s.min); const ok=f.filter(s=>s.qty>=s.min);
  const total=stock.reduce((s,t)=>s+t.qty,0); const val=stock.reduce((s,t)=>s+t.qty*t.cost,0);
  const adj=(id,d)=>setStock(p=>p.map(s=>s.id===id?{...s,qty:Math.max(0,s.qty+d)}:s));
  const Row=({t,urgent})=>(
    <div style={{background:urgent?C.dangerDim:C.card,border:`1px solid ${urgent?C.danger+"44":C.warn+"44"}`,borderRadius:14,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:800}}>{t.size}</div><div style={{fontSize:12,color:C.muted}}>{t.brand}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>adj(t.id,-1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14} color={C.text}/></button>
          <div style={{width:32,textAlign:"center",fontSize:16,fontWeight:800,color:urgent?C.danger:C.warn}}>{t.qty}</div>
          <button onClick={()=>adj(t.id,1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14} color={C.text}/></button>
        </div>
      </div>
      <div style={{marginTop:8,display:"flex",gap:8}}>
        <Badge label={urgent?"OUT OF STOCK":"LOW STOCK"} color={urgent?C.danger:C.warn}/>
        <span style={{fontSize:11,color:C.subtle}}>Min: {t.min} · {fmt(t.cost)}/ea</span>
      </div>
    </div>
  );
  const NRow=({t})=>(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:700}}>{t.size}</div><div style={{fontSize:12,color:C.muted}}>{t.brand} · {fmt(t.cost)}/ea</div></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>adj(t.id,-1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14} color={C.text}/></button>
          <div style={{width:32,textAlign:"center",fontSize:16,fontWeight:800}}>{t.qty}</div>
          <button onClick={()=>adj(t.id,1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14} color={C.text}/></button>
        </div>
      </div>
    </div>
  );
  return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={{fontSize:20,fontWeight:900,marginBottom:16}}>Inventory</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[["Total Tires",total,C.text],["Stock Value",fmt(val),C.orange],["Low Stock",low.length,C.warn],["Out of Stock",out.length,C.danger]].map(([l,v,co])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}><div style={{fontSize:22,fontWeight:800,color:co}}>{v}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{l}</div></div>
        ))}
      </div>
      <div style={{position:"relative",marginBottom:14}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Icon name="search" size={16} color={C.subtle}/></div>
        <input value={search} onChange={e=>setSearch(e.target.value.toLowerCase())} placeholder="Search tire size or brand..."
          style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 12px 10px 36px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
      </div>
      {out.length>0&&<><SectionLabel>Out of Stock — Reorder Now</SectionLabel>{out.map(t=><Row key={t.id} t={t} urgent={true}/>)}</>}
      {low.length>0&&<><SectionLabel>Running Low</SectionLabel>{(showAll?low:low.slice(0,3)).map(t=><Row key={t.id} t={t} urgent={false}/>)}{low.length>3&&<button onClick={()=>setShowAll(!showAll)} style={{background:"transparent",border:"none",color:C.orange,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12}}>{showAll?"Show Less":`Show All ${low.length} Low-Stock Items`}</button>}</>}
      {ok.length>0&&<><SectionLabel>In Stock</SectionLabel>{ok.map(t=><NRow key={t.id} t={t}/>)}</>}
    </div>
  );
};

      <Card>
        <FInput label={`Flat Repair — Min Gross Profit ($${s.repairTarget})`} type="number" value={s.repairTarget} onChange={v=>set("repairTarget",parseFloat(v)||0)}/>
        <FInput label={`Tire Replacement — Min Gross Profit ($${s.replacementTarget})`} type="number" value={s.replacementTarget} onChange={v=>set("replacementTarget",parseFloat(v)||0)} style={{marginBottom:0}}/>
      </Card>
      <SectionLabel>Monthly Fixed Expenses</SectionLabel>
      <Card>
        <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Divided across ~4.33 weeks · currently {fmt(wFixed)}/week</div>
        {s.fixedExpenses.map(e=>(
          <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:12,color:C.muted}}>{fmt(e.monthly)}/mo</div></div>
            <button onClick={()=>delFixed(e.id)} style={{background:"transparent",border:"none",cursor:"pointer"}}><Icon name="trash" size={16} color={C.danger}/></button>
          </div>
        ))}
        <div style={{marginTop:12,display:"flex",gap:8}}>
          <input value={newExp.name} onChange={e=>setNewExp(p=>({...p,name:e.target.value}))} placeholder="Expense name" style={{flex:2,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
          <input value={newExp.monthly} onChange={e=>setNewExp(p=>({...p,monthly:e.target.value}))} placeholder="$/mo" type="number" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
          <button onClick={addFixed} style={{background:C.orange,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer"}}><Icon name="plus" size={16} color="#fff"/></button>
        </div>
      </Card>
      <SectionLabel>Business</SectionLabel>
      <Card>
        <FInput label="Google Review Link" value={s.googleReviewLink} onChange={v=>set("googleReviewLink",v)}/>
        <div style={{fontSize:11,color:C.muted}}>Share this after every job to build your reputation</div>
      </Card>
      <Btn label="Save Settings" onClick={()=>setSettings(s)} style={{width:"100%",marginTop:8,marginBottom:16}}/>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [jobs,setJobs]=useState(INIT_JOBS);
  const [expenses,setExpenses]=useState(INIT_EXPENSES);
  const [stock,setStock]=useState(INIT_STOCK);
  const [settings,setSettings]=useState(INIT_SETTINGS);
  const [showLog,setShowLog]=useState(false);

  const addJob=form=>{
    setJobs(prev=>{
      const ex=prev.find(j=>j.id===form.id);
      if(ex) return prev.map(j=>j.id===form.id?{...form,revenue:parseFloat(form.revenue),cost:parseFloat(form.cost)}:j);
      return [{...form,id:Date.now(),revenue:parseFloat(form.revenue)||0,cost:parseFloat(form.cost)||0},...prev];
    });
  };
  const delJob=id=>setJobs(p=>p.filter(j=>j.id!==id));

  const pages={
    dashboard:<Dashboard jobs={jobs} settings={settings}/>,
    history:<History jobs={jobs} onAdd={addJob} onDelete={delJob} settings={settings}/>,
    payouts:<Payouts jobs={jobs} settings={settings}/>,
    stock:<Stock stock={stock} setStock={setStock}/>,
    settings:<Settings settings={settings} setSettings={setSettings}/>,
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:"'DM Sans',sans-serif",color:C.text,position:"relative",display:"flex",flexDirection:"column"}}>
      <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>{pages[tab]}</div>
      <FAB onClick={()=>setShowLog(true)}/>
      <BottomNav active={tab} setActive={setTab}/>
      {showLog&&<JobModal job={null} settings={settings} onClose={()=>setShowLog(false)} onSave={form=>{addJob(form);setShowLog(false);}} onDelete={()=>{}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
